# List of restricted types that should not be used in JShell
# Format: fully qualified class names or package patterns with wildcard
# Examples:
#   java.io.File - restrict specific class
#   java.nio.file.* - restrict entire package

# File system operations (restricted for security)
java.io.File
java.io.FileInputStream
java.io.FileOutputStream
java.io.FileReader
java.io.FileWriter
java.io.PrintWriter
java.io.PrintStream
java.io.RandomAccessFile
java.nio.file.*
java.nio.channels.FileChannel

# Network operations (restricted for security)
java.net.Socket
java.net.ServerSocket
java.net.HttpURLConnection
java.net.URL
java.net.URI

# System operations (restricted for security)
java.lang.ProcessBuilder
java.lang.Process

# Class loading (restricted for security)
java.lang.ClassLoader
java.net.URLClassLoader
java.security.*

# Database access (restricted for security)
java.sql.*

# Script engines (restricted for security)
javax.script.*

# Remote Method Invocation (restricted for security)
java.rmi.*

# Java Management Extensions (restricted for security)
javax.management.*

# Serialization (restricted for security)
java.io.ObjectInputStream
java.io.ObjectOutputStream

# Clipboard operations (restricted for security)
java.awt.datatransfer.*

# GUI operations (restricted for security)
java.awt.*
javax.swing.*

# Email operations (restricted for security)
javax.mail.*

# System preferences (restricted for security)
java.util.prefs.*

# Thread pools (restricted for security)
java.util.concurrent.ForkJoinPool
java.util.concurrent.ThreadPoolExecutor
java.util.Timer
java.util.TimerTask

# XML processing (restricted for security)
javax.xml.transform.*
org.xml.sax.*

# JNDI/LDAP (restricted for security)
javax.naming.*
javax.naming.directory.*
