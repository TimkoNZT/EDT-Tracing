name: Build and Publish P2

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create ZIP from P2 repo
        shell: bash
        run: |
          version=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "1.0.0")
          cd dist/p2repo
          zip -r "../edt-tracing-plugin_${version}.zip" .

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/p2repo

      - name: Upload ZIP to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/edt-tracing-plugin_*.zip

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: edt-tracing-plugin
          path: ./dist/edt-tracing-plugin_*.zip
