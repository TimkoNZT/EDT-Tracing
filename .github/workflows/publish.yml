name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 21

      - name: Download EDT headless
        shell: pwsh
        run: |
          $url = "https://releases.1c.ru/edt/1c-edt-headless-2025.2.6+4-win64.zip"
          $zip = "$env:TEMP\edt.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:ProgramFiles\1C\1CE\components" -Force

      - name: Build
        shell: pwsh
        run: ./build-javac.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.zip
